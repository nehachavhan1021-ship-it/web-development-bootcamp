<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix India</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO SECTION -->
<div class="main">

  <nav>
    <img src="assets/logo.svg" class="logo">

    <div>
      <button class="lang">English</button>
      <button class="signin">Sign In</button>
    </div>
  </nav>

  <div class="hero">
    <h1>Unlimited movies, TV shows and more</h1>
    <h3>Starts at ₹149. Cancel anytime.</h3>
    <p>Ready to watch? Enter your email to create or restart your membership.</p>

    <div class="email-box">
      <input type="text" placeholder="Email address">
      <button>Get Started &gt;</button>
    </div>
  </div>

</div>

<!-- SEPARATOR -->
<div class="line"></div>

<!-- MOVIE ROW -->
<section class="row">
  <h2>Trending Now</h2>
  <div class="row-posters">
    <img src="assets/img1.jpg">
    <img src="assets/img2.jpg">
    <img src="assets/img3.jpg">
    <img src="assets/img4.jpg">
    <img src="assets/img5.jpg">
    <img src="assets/img6.jpg">
  </div>
</section>

<!-- SEPARATOR -->
<div class="line"></div>

<section class="row">
  <h2>Popular on Netflix</h2>
  <div class="row-posters">
    <img src="assets/img7.jpg">
    <img src="assets/img8.jpg">
    <img src="assets/img9.jpg">
    <img src="assets/img10.jpg">
    <img src="assets/img11.jpg">
  </div>
</section>

</body>
</html>
