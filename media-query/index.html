<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<style>
    /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* DEFAULT (Desktop First) */
body {
    font-family: Arial, sans-serif;
}

header {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}

nav {
    background: gray;
}

.nav-links {
    display: flex;
    justify-content: space-around;
    list-style: none;
    padding: 15px;
}

/* MAIN CONTENT */
.container {
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

.box {
    background: purple;
    color: white;
    padding: 40px;
    width: 30%;
    text-align: center;
}

footer {
    background: black;
    color: white;
    text-align: center;
    padding: 10px;
}

/* ========================= */
/* 📱 MOBILE (max-width: 600px) */
/* ========================= */
@media (max-width: 600px) {

    body {
        background-color: lightyellow;
    }

    .nav-links {
        flex-direction: column;
        text-align: center;
    }

    .container {
        flex-direction: column;
        align-items: center;
    }

    .box {
        width: 80%;
        margin-bottom: 15px;
    }
}

/* ========================= */
/* 📱 TABLET (601px - 900px) */
/* ========================= */
@media (min-width: 601px) and (max-width: 900px) {

    body {
        background-color: lightblue;
    }

    .container {
        flex-wrap: wrap;
    }

    .box {
        width: 45%;
        margin-bottom: 15px;
    }
}

/* ========================= */
/* 💻 LARGE SCREENS (901px+) */
/* ========================= */
@media (min-width: 901px) {

    body {
        background-color: white;
    }
}
</style>
<body>

    <header>
        <h1>Responsive Website</h1>
    </header>

    <nav>
        <ul class="nav-links">
            <li>Home</li>
            <li>About</li>
            <li>Services</li>
            <li>Contact</li>
        </ul>
    </nav>

    <section class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </section>

    <footer>
        <p>© 2026 Your Website</p>
    </footer>

</body>
</html>
