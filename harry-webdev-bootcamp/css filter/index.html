<!DOCTYPE html>
<html>
<head>
    <style>
        .hero {
            height: 100vh;
            background: url("https://picsum.photos/1200") no-repeat center/cover;
            position: relative;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="overlay"></div>
        <div class="content">
            <h1>Unlimited Movies</h1>
            <p>Watch anywhere</p>
        </div>
    </div>

</body>
</html>
